<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinHTML11</title>
    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        /* Desktop Background */
        .desktop {
            width: 100%;
            height: 100%;
            background-image: url('https://fastly.jsdelivr.net/gh/zaka13X/WinHTML11/system32/Windows-11-Bloom-Screensaver-Dark-scaled.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            align-content: flex-start;
            padding: 20px;
            gap: 20px;
        }

        /* Desktop Shortcuts */
        .shortcut {
            width: 80px;
            height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid transparent;
            transition: background 0.2s;
            z-index: 1;
        }

        .shortcut:hover {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Icon Styling */
        .shortcut .icon {
            font-size: 32px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
        }

        .shortcut span {
            color: white;
            font-size: 12px;
            text-shadow: 0px 1px 2px rgba(0, 0, 0, 0.8);
            word-break: break-word;
            max-width: 100%;
            padding: 0 2px;
        }

        /* Main App Window Layout */
        .window {
            position: absolute;
            top: 10%;
            left: 15%;
            width: 70%;
            height: 70%;
            background: rgba(28, 28, 28, 0.85);
            backdrop-filter: blur(30px);
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 10;
        }

        /* Start Menu Flyout Panel Layout */
        .start-menu {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 450px;
            height: 550px;
            background: rgba(28, 28, 28, 0.9);
            backdrop-filter: blur(30px);
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            overflow: hidden;
            z-index: 50;
        }

        /* State management toggles */
        .window.hidden, .start-menu.hidden {
            display: none;
        }

        /* Title Bar Customizations */
        .title-bar {
            height: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(32, 32, 32, 0.6);
            cursor: default;
            padding-left: 16px;
        }

        .window-title {
            font-size: 12px;
            color: #ffffff;
        }

        .controls {
            display: flex;
            height: 100%;
        }

        .control-btn {
            width: 46px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 11px;
            cursor: pointer;
            transition: background 0.1s;
        }

        .control-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .btn-close:hover {
            background-color: #e81123 !important;
        }

        /* Embedded Context Configurations */
        .content {
            flex: 1;
            border: none;
            background: #1f1f1f;
            width: 100%;
            height: 100%;
        }

        /* Core Taskbar System Layout */
        .taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 48px;
            background: rgba(32, 32, 32, 0.85);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .taskbar-center {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .taskbar-icon {
            font-size: 24px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .taskbar-icon:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <!-- Desktop Environment -->
    <div id="desktopEnv" class="desktop">

        <!-- Edge Shortcut -->
        <div class="shortcut" onclick="openApp('/browser.html', 'Microsoft Edge', event)">
            <div class="icon">🌐</div>
            <span>Microsoft Edge</span>
        </div>

        <!-- Games Shortcut -->
        <div class="shortcut" onclick="openApp('/games.html', 'Games', event)">
            <div class="icon">🎮</div>
            <span>Games</span>
        </div>

        <!-- Proxy Shortcut -->
        <div class="shortcut" onclick="openApp('/proxy.html', 'Proxy', event)">
            <div class="icon">🛡️</div>
            <span>Proxy</span>
        </div>

        <!-- Virtual App Window Framework -->
        <div id="appWindow" class="window hidden" onclick="event.stopPropagation()">
            <div class="title-bar">
                <span id="windowTitle" class="window-title">Application</span>
                <div class="controls">
                    <div class="control-btn" onclick="minimizeApp()">&#9472;</div>
                    <div class="control-btn" onclick="maximizeApp()">&#9633;</div>
                    <div class="control-btn btn-close" onclick="closeApp()">&#10005;</div>
                </div>
            </div>
            <!-- Dynamic Subframe Sandbox Node -->
            <iframe id="appFrame" src="" class="content"></iframe>
        </div>

        <!-- Start Menu Modular Panel -->
        <div id="startMenuPanel" class="start-menu hidden" onclick="event.stopPropagation()">
            <iframe src="/start.html" class="content"></iframe>
        </div>

    </div>

    <!-- Windows 11 Centered Taskbar Components -->
    <div class="taskbar">
        <div class="taskbar-center">
            <div class="taskbar-icon" onclick="toggleStartMenu(event)">🔷</div>
            <div class="taskbar-icon" onclick="openApp('/browser.html', 'Microsoft Edge', event)">🌐</div>
            <div class="taskbar-icon" onclick="openApp('/games.html', 'Games', event)">🎮</div>
            <div class="taskbar-icon" onclick="openApp('/proxy.html', 'Proxy', event)">🛡️</div>
        </div>
    </div>

    <!-- State Logic Control Core Engine -->
    <script>
        const appWindow = document.getElementById('appWindow');
        const appFrame = document.getElementById('appFrame');
        const windowTitle = document.getElementById('windowTitle');
        const startMenuPanel = document.getElementById('startMenuPanel');
        const desktopEnv = document.getElementById('desktopEnv');

        // Handles standard file and browser window state rendering
        function openApp(url, title, event) {
            if (event) event.stopPropagation();
            startMenuPanel.classList.add('hidden');
            windowTitle.textContent = title;
            appFrame.src = url;
            appWindow.classList.remove('hidden');
        }

        // Context switcher for opening and closing start.html 
        function toggleStartMenu(event) {
            if (event) event.stopPropagation();
            startMenuPanel.classList.toggle('hidden');
        }

        // Detects background workspace interaction to auto-hide panel views
        desktopEnv.addEventListener('click', () => {
            startMenuPanel.classList.add('hidden');
        });

        // Memory dump and window hiding functions
        function closeApp() {
            appWindow.classList.add('hidden');
            appFrame.src = ""; 
        }

        function minimizeApp() {
            appWindow.classList.add('hidden');
        }

        function maximizeApp() {
            if(appWindow.style.width === "100%") {
                appWindow.style.width = "70%";
                appWindow.style.height = "70%";
                appWindow.style.top = "10%";
                appWindow.style.left = "15%";
                appWindow.style.borderRadius = "8px";
            } else {
                appWindow.style.width = "100%";
                appWindow.style.height = "calc(100% - 48px)";
                appWindow.style.top = "0";
                appWindow.style.left = "0";
                appWindow.style.borderRadius = "0";
            }
        }
    </script>
</body>
</html>
