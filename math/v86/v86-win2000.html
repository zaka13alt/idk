<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>v86 Emulator</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #111;
    font-family: Arial, sans-serif;
}

#toolbar {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 1000;
    display: flex;
    gap: 10px;
}

button {
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    background: #2196F3;
    color: white;
}

button:hover {
    background: #1976D2;
}

#screen_container {
    width: 100vw;
    height: 100vh;
}

canvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
}
</style>
</head>
<body>

<div id="toolbar">
    <button id="lockMouse">🔒 Lock Mouse</button>
</div>

<div id="screen_container"></div>

<script src="https://cdn.jsdelivr.net/npm/v86/build/libv86.js"></script>

<script>
const emulator = new V86({
    wasm_path: "https://cdn.jsdelivr.net/npm/v86/build/v86.wasm",

    screen_container: document.getElementById("screen_container"),

    memory_size: 256 * 1024 * 1024,
    vga_memory_size: 8 * 1024 * 1024,

    bios: {
        url: "https://cdn.jsdelivr.net/gh/zaka13alt/idk@HEAD/math/v86/seabios.bin"
    },

    vga_bios: {
        url: "https://cdn.jsdelivr.net/gh/zaka13alt/idk@HEAD/math/v86/vgabios.bin"
    },

    
    initial_state: {
        url: "https://placeholder/win2000.bin"
    },

    network_relay_url: "wss://relay.widgetry.org/",

    autostart: true
});

// Mouse lock
document.getElementById("lockMouse").addEventListener("click", () => {
    const canvas = document.querySelector("#screen_container canvas");
    if (canvas) canvas.requestPointerLock?.();
});

document.addEventListener("pointerlockchange", () => {
    document.getElementById("lockMouse").textContent =
        document.pointerLockElement
            ? "🔓 Mouse Locked (Esc to release)"
            : "🔒 Lock Mouse";
});
</script>

</body>
</html>
